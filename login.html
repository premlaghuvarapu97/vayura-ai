<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Vayura AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { background: #111; border: 1px solid #1f1f1f; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff6b00, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 32px; }
        h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #666; text-align: center; margin-bottom: 32px; font-size: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #888; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 18px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: white; font-size: 15px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #ff6b00; }
        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, #ff6b00, #ff9500); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.3s; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .divider { text-align: center; color: #444; margin: 24px 0; font-size: 14px; position: relative; }
        .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 45%; height: 1px; background: #222; }
        .divider::after { content: ''; position: absolute; right: 0; top: 50%; width: 45%; height: 1px; background: #222; }
        .btn-google { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .switch-link { text-align: center; margin-top: 24px; color: #666; font-size: 14px; }
        .switch-link a { color: #ff9500; text-decoration: none; font-weight: 600; }
        .error-msg { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.3); color: #ff6b6b; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
        .success-msg { background: rgba(0, 255, 0, 0.1); border: 1px solid rgba(0, 255, 0, 0.3); color: #6bff6b; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">⚡ Vayura AI</div>
        <h1>Welcome back!</h1>
        <p class="subtitle">Sign in to your account</p>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
            Sign In 🚀
        </button>

        <div class="divider">or</div>

        <button class="btn-google" onclick="handleGoogleLogin()">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <div class="switch-link">
            Don't have an account? <a href="signup.html">Sign up free</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://dyfmqxxkouxtbjdotkfl.supabase.co',
            'sb_publishable_1ShN1szvqueVwxdvni7vAw_gg11xgWl'
        )

        async function handleLogin() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const btn = document.getElementById('loginBtn')
            const errorMsg = document.getElementById('errorMsg')

            if (!email || !password) {
                errorMsg.textContent = 'Please fill in all fields'
                errorMsg.style.display = 'block'
                return
            }

            btn.textContent = 'Signing in...'
            btn.disabled = true
            errorMsg.style.display = 'none'

            const { data, error } = await supabase.auth.signInWithPassword({
                email, password
            })

            if (error) {
                errorMsg.textContent = error.message
                errorMsg.style.display = 'block'
                btn.textContent = 'Sign In 🚀'
                btn.disabled = false
            } else {
                window.location.href = 'dashboard.html'
            }
        }

        async function handleGoogleLogin() {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/dashboard.html'
                }
            })
        }

        // Check if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'dashboard.html'
        })
    </script>
</body>
</html>
