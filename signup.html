<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Vayura AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-container { background: #111; border: 1px solid #1f1f1f; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff6b00, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 32px; cursor: pointer; }
        h1 { font-size: 28px; font-weight: 800; texsuccessMsg.textContent t-align: center; margin-bottom: 8px; }
        .subtitle { color: #666; text-align: center; margin-bottom: 32px; font-size: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #888; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 18px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: white; font-size: 15px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #ff6b00; }
        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, #ff6b00, #ff9500); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.3s; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .switch-link { text-align: center; margin-top: 24px; color: #666; font-size: 14px; }
        .switch-link a { color: #ff9500; text-decoration: none; font-weight: 600; }
        .error-msg { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.3); color: #ff6b6b; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
        .success-msg { background: rgba(0, 255, 0, 0.1); border: 1px solid rgba(0, 255, 0, 0.3); color: #6bff6b; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
        .plan-badge { background: rgba(255, 107, 0, 0.15); border: 1px solid rgba(255, 107, 0, 0.3); color: #ff9500; padding: 8px 16px; border-radius: 25px; font-size: 13px; text-align: center; margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo" onclick="window.location.href='index.html'">⚡ Vayura AI</div>
        <h1>Create account</h1>
        <p class="subtitle">Start landing your dream job today</p>
        <div class="plan-badge">🎉 Early bird — 50% off forever!</div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Your full name" />
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" />
        </div>

        <button class="btn-primary" id="signupBtn">
            Create Free Account 🚀
        </button>

        <div class="switch-link">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dyfmqxxkouxtbjdotkfl.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5Zm1xeHhrb3V4dGJqZG90a2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mjc2MjEsImV4cCI6MjA5NDAwMzYyMX0.fOegPPpTyEWdJOoZ1mOiZtTUt5Nje3sp7Y7siwbLaOs'

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        document.getElementById('signupBtn').addEventListener('click', async function() {
            const fullName = document.getElementById('fullName').value.trim()
            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value
            const btn = document.getElementById('signupBtn')
            const errorMsg = document.getElementById('errorMsg')
            const successMsg = document.getElementById('successMsg')

            errorMsg.style.display = 'none'
            successMsg.style.display = 'none'

            if (!fullName || !email || !password) {
                errorMsg.textContent = '⚠️ Please fill in all fields'
                errorMsg.style.display = 'block'
                return
            }

            if (password.length < 6) {
                errorMsg.textContent = '⚠️ Password must be at least 6 characters'
                errorMsg.style.display = 'block'
                return
            }

            btn.textContent = 'Creating account...'
            btn.disabled = true

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { full_name: fullName }
                    }
                })

                if (error) {
                    errorMsg.textContent = '❌ ' + error.message
                    errorMsg.style.display = 'block'
                    btn.textContent = 'Create Free Account 🚀'
                    btn.disabled = false
                    return
                }

                successMsg.textContent = '🎉 Account created! Redirecting to dashboard...'
                successMsg.style.display = 'block'
                btn.textContent = '✅ Account Created!'

                // Don't auto-redirect, user must verify email first

            } catch (err) {
                errorMsg.textContent = '❌ Error: ' + err.message
                errorMsg.style.display = 'block'
                btn.textContent = 'Create Free Account 🚀'
                btn.disabled = false
            }
        })

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('signupBtn').click()
            }
        })
    </script>
</body>
</html>
